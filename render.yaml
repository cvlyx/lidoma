services:
  - type: web
    name: lidoma-backend
    runtime: python
    pythonVersion: 3.13
    buildCommand: pip install --prefer-binary -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PIP_PREFER_BINARY
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "true"
