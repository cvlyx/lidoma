services:
  - type: web
    name: lidoma-backend
    runtime: python
    pythonVersion: "3.11.7"
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://lidoma-kmum.vercel.app,https://cvlyx.github.io,http://localhost:8787,http://127.0.0.1:8787"
